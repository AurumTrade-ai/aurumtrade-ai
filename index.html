<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AurumTrade AI</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .gold-text { color: #f39c12; text-shadow: 0 0 10px rgba(243, 156, 18, 0.2); }
        .gold-bg { background-color: #f39c12; }
        .card-bg { 
            background-color: rgba(26, 26, 26, 0.75); 
            border: 1px solid rgba(243, 156, 18, 0.15); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-4 max-w-md mx-auto relative min-h-screen">

    <!-- लाइव मूविंग AI ट्रेडिंग ग्राफ बैकग्राउंड -->
    <canvas id="bg-canvas"></canvas>

    <!-- ================= AUTH SECTION (SIGN UP / LOGIN) ================= -->
    <div id="auth-screen" class="space-y-6 mt-10 relative z-10">
        <div class="text-center">
            <h1 class="text-3xl font-bold gold-text flex items-center justify-center gap-2">
                <i class="fa-solid fa-chart-line text-2xl animate-pulse"></i> AurumTrade AI
            </h1>
            <p class="text-gray-400 text-sm mt-1 tracking-wider">Secure Institutional Trading Platform</p>
        </div>

        <!-- Toggle Tabs -->
        <div class="flex border-b border-zinc-800 backdrop-blur-sm rounded-t-xl overflow-hidden">
            <button id="tab-login" class="w-1/2 py-3 text-center font-bold border-b-2 border-amber-500 gold-text bg-zinc-900/30" onclick="switchAuthTab('login')">Login</button>
            <button id="tab-signup" class="w-1/2 py-3 text-center font-bold text-gray-500 bg-zinc-900/10" onclick="switchAuthTab('signup')">Sign Up</button>
        </div>

        <!-- Auth Form -->
        <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4 card-bg p-6 rounded-b-xl shadow-2xl">
            <div id="firstname-field" class="hidden">
                <label class="block text-xs font-semibold text-gray-400 mb-1">FIRST NAME</label>
                <input type="text" id="auth-firstname" class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm focus:outline-none focus:border-amber-500 text-white" placeholder="Rahul">
            </div>
            <div id="lastname-field" class="hidden">
                <label class="block text-xs font-semibold text-gray-400 mb-1">LAST NAME / SURNAME</label>
                <input type="text" id="auth-lastname" class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm focus:outline-none focus:border-amber-500 text-white" placeholder="Saini">
            </div>
            <div id="username-field" class="hidden">
                <label class="block text-xs font-semibold text-gray-400 mb-1">UNIQUE USERNAME</label>
                <input type="text" id="auth-username" class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm focus:outline-none focus:border-amber-500 text-white" placeholder="rahul9493">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">GMAIL ADDRESS</label>
                <input type="email" id="auth-email" required class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm focus:outline-none focus:border-amber-500 text-white" placeholder="yourname@gmail.com">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">PASSWORD</label>
                <div class="relative">
                    <input type="password" id="auth-password" required class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm focus:outline-none focus:border-amber-500 pr-10 text-white" placeholder="******">
                    <button type="button" onclick="togglePasswordVisibility('auth-password', 'eye-icon-1')" class="absolute right-3 top-2 text-gray-500 hover:text-white">
                        <i id="eye-icon-1" class="fa-solid fa-eye-slash text-xs"></i>
                    </button>
                </div>
            </div>
            <div id="confirm-password-field" class="hidden">
                <label class="block text-xs font-semibold text-gray-400 mb-1">CONFIRM PASSWORD</label>
                <div class="relative">
                    <input type="password" id="auth-confirm-password" class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm focus:outline-none focus:border-amber-500 pr-10 text-white" placeholder="******">
                    <button type="button" onclick="togglePasswordVisibility('auth-confirm-password', 'eye-icon-2')" class="absolute right-3 top-2 text-gray-500 hover:text-white">
                        <i id="eye-icon-2" class="fa-solid fa-eye-slash text-xs"></i>
                    </button>
                </div>
            </div>
            <!-- REFERRAL CODE FIELD: अब सिर्फ Sign Up के समय दिखेगा -->
            <div id="referral-field" class="hidden">
                <label class="block text-xs font-semibold text-gray-400 mb-1">REFERRAL CODE (OPTIONAL)</label>
                <input type="text" id="auth-ref" class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm focus:outline-none text-amber-400 border-zinc-700" placeholder="e.g. AURUM-rahul">
            </div>
            <button type="submit" id="auth-btn" class="w-full gold-bg text-black font-bold py-2.5 rounded text-sm hover:bg-amber-600 transition shadow-lg shadow-amber-500/20 mt-2">Login Account</button>
        </form>
    </div>

    <!-- बाकी कोड (Script, Modals, Dashboard) वैसा ही रहेगा... -->
    
    <script>
        // switchAuthTab फंक्शन में बस यह एक लाइन जोड़ी है ताकि referral field छिप सके
        window.switchAuthTab = function(mode) {
            window.authMode = mode;
            // ... (बाकी कोड)
            document.getElementById('referral-field').style.display = mode === 'signup' ? 'block' : 'none'; 
            // ...
        };
    </script>
</body>
</html>
