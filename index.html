<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AurumTrade AI - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; }
        .card-bg { background-color: #1a1a1a; border: 1px solid #333; }
        .gold-text { color: #f39c12; }
        .gold-bg { background-color: #f39c12; }
    </style>
</head>
<body class="p-6 max-w-sm mx-auto">

    <div id="auth-screen" class="mt-10">
        <h1 class="text-2xl font-bold gold-text text-center mb-6">AurumTrade AI</h1>
        
        <form id="auth-form" onsubmit="handleAuth(event)" class="card-bg p-6 rounded-xl space-y-4">
            <!-- Username Input -->
            <div>
                <label class="text-[10px] text-gray-400">USER ID (Username)</label>
                <input type="text" id="auth-username" required class="w-full bg-black p-2 rounded border border-zinc-700">
            </div>
            
            <!-- Email Input (Only for Signup) -->
            <div id="email-field" class="hidden">
                <label class="text-[10px] text-gray-400">GMAIL ADDRESS</label>
                <input type="email" id="auth-email" class="w-full bg-black p-2 rounded border border-zinc-700">
            </div>

            <div>
                <label class="text-[10px] text-gray-400">PASSWORD</label>
                <input type="password" id="auth-password" required class="w-full bg-black p-2 rounded border border-zinc-700">
            </div>

            <button type="submit" id="auth-btn" class="w-full gold-bg text-black font-bold py-2 rounded">Login</button>
            
            <div class="flex justify-between text-[10px]">
                <button type="button" onclick="toggleMode()" id="mode-text" class="text-amber-500">New User? Register</button>
                <button type="button" onclick="forgotPassword()" class="text-gray-500">Forgot Password?</button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAKdE-B-o74-r-jTtPXgiPitkH7QdrTigg", 
            authDomain: "aurumtrade-ai.firebaseapp.com", 
            projectId: "aurumtrade-ai", 
            storageBucket: "aurumtrade-ai.firebasestorage.app", 
            messagingSenderId: "213283112650", 
            appId: "1:213283112650:web:20bcdd734fffe85d17d633" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let isLogin = true;

        window.toggleMode = () => {
            isLogin = !isLogin;
            document.getElementById('email-field').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-btn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('mode-text').innerText = isLogin ? 'New User? Register' : 'Already have account? Login';
        };

        window.handleAuth = (e) => {
            e.preventDefault();
            const username = document.getElementById('auth-username').value.trim().toLowerCase();
            const password = document.getElementById('auth-password').value;
            const email = document.getElementById('auth-email').value;

            if (!isLogin) {
                // REGISTRATION: Username को की (key) बनाकर डेटा सेव करें
                get(ref(db, `users/${username}`)).then(snapshot => {
                    if (snapshot.exists()) {
                        alert("Username already taken!");
                    } else {
                        set(ref(db, `users/${username}`), { password, email, totalInvestment: 0 }).then(() => {
                            alert("Registered! Now Login.");
                            toggleMode();
                        });
                    }
                });
            } else {
                // LOGIN: Username से डेटा लाएं और पासवर्ड मैच करें
                get(ref(db, `users/${username}`)).then(snapshot => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        if (data.password === password) {
                            alert("Login Successful!");
                            // यहाँ आप डैशबोर्ड दिखा सकते हैं
                        } else {
                            alert("Wrong Password!");
                        }
                    } else {
                        alert("User ID not found!");
                    }
                });
            }
        };

        window.forgotPassword = () => {
            const username = document.getElementById('auth-username').value;
            if(!username) return alert("Enter Username first!");
            get(ref(db, `users/${username}`)).then(s => {
                if(s.exists()) alert("Password sent to: " + s.val().email);
                else alert("Username not found!");
            });
        };
    </script>
</body>
</html>
