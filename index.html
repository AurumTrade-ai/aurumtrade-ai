<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AurumTrade AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .gold-text { color: #f39c12; text-shadow: 0 0 10px rgba(243, 156, 18, 0.2); }
        .gold-bg { background-color: #f39c12; }
        .card-bg { 
            background-color: rgba(26, 26, 26, 0.75); 
            border: 1px solid rgba(243, 156, 18, 0.15); 
            backdrop-filter: blur(12px);
        }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto relative min-h-screen">

    <canvas id="bg-canvas"></canvas>

    <div id="auth-screen" class="space-y-6 mt-10 relative z-10">
        <div class="text-center">
            <h1 class="text-3xl font-bold gold-text flex items-center justify-center gap-2">
                <i class="fa-solid fa-chart-line text-2xl animate-pulse"></i> AurumTrade AI
            </h1>
        </div>

        <div class="flex border-b border-zinc-800 backdrop-blur-sm rounded-t-xl overflow-hidden">
            <button id="tab-login" class="w-1/2 py-3 text-center font-bold border-b-2 border-amber-500 gold-text bg-zinc-900/30" onclick="switchAuthTab('login')">Login</button>
            <button id="tab-signup" class="w-1/2 py-3 text-center font-bold text-gray-500 bg-zinc-900/10" onclick="switchAuthTab('signup')">Sign Up</button>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4 card-bg p-6 rounded-b-xl shadow-2xl">
            <div id="username-field">
                <label class="block text-xs font-semibold text-gray-400 mb-1">USER ID (Username)</label>
                <input type="text" id="auth-username" required class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm text-white" placeholder="rahul9493">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">PASSWORD</label>
                <input type="password" id="auth-password" required class="w-full bg-black/40 border border-zinc-700 rounded p-2 text-sm text-white" placeholder="******">
            </div>
            <button type="submit" id="auth-btn" class="w-full gold-bg text-black font-bold py-2.5 rounded text-sm mt-2">Login Account</button>
        </form>
    </div>

    <div id="dashboard-screen" class="hidden space-y-4 relative z-10 mt-4">
        <div class="card-bg p-4 rounded-lg">
            <h3 class="text-[10px] font-bold text-gray-400 uppercase">USDT (BEP-20) Wallet Address</h3>
            <input type="text" id="wallet-input" class="w-full bg-black/40 p-2 rounded text-xs text-white border border-zinc-700 mt-2" placeholder="0x...">
            <button onclick="saveWallet()" class="w-full bg-zinc-800 text-amber-500 text-xs py-2 rounded mt-2 border border-amber-500/30">Verify/Update Wallet</button>
        </div>
        <button onclick="location.reload()" class="w-full text-red-400 text-xs">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKdE-B-o74-r-jTtPXgiPitkH7QdrTigg",
            authDomain: "aurumtrade-ai.firebaseapp.com",
            projectId: "aurumtrade-ai",
            databaseURL: "https://aurumtrade-ai-default-rtdb.firebaseio.com",
            storageBucket: "aurumtrade-ai.firebasestorage.app",
            messagingSenderId: "213283112650",
            appId: "1:213283112650:web:20bcdd734fffe85d17d633"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        window.authMode = 'login';

        window.switchAuthTab = (mode) => {
            window.authMode = mode;
            document.getElementById('auth-btn').innerText = mode === 'login' ? 'Login Account' : 'Register Account';
        };

        window.handleAuth = (e) => {
            e.preventDefault();
            const u = document.getElementById('auth-username').value.trim().toLowerCase();
            const p = document.getElementById('auth-password').value;

            if (window.authMode === 'signup') {
                set(ref(db, 'users/' + u), { password: p, wallet: "" }).then(() => alert("Registered!"));
            } else {
                get(ref(db, 'users/' + u)).then(s => {
                    if (s.exists() && s.val().password === p) {
                        document.getElementById('auth-screen').classList.add('hidden');
                        document.getElementById('dashboard-screen').classList.remove('hidden');
                    } else alert("Invalid ID or Password");
                });
            }
        };

        window.saveWallet = () => {
            const addr = document.getElementById('wallet-input').value.trim();
            const u = document.getElementById('auth-username').value.trim().toLowerCase();
            if(!addr.startsWith('0x') || addr.length !== 42) return alert("Invalid BEP20 Address!");
            
            update(ref(db, 'pendingWalletChanges/' + u), { newWallet: addr }).then(() => {
                alert("Verification request sent to Admin!");
            });
        };
    </script>
</body>
</html>
